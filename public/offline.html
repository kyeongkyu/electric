<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <title>electric offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #030712;
        color: #e5f3ff;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 50% 0%, rgba(34, 211, 238, 0.18), transparent 32%),
          #030712;
      }

      main {
        width: min(100%, 360px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 28px;
        background: rgba(8, 17, 31, 0.72);
        padding: 28px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.36), inset 0 1px 1px rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(10px) saturate(180%);
      }

      p {
        margin: 0;
        color: #94a3b8;
        line-height: 1.7;
        font-size: 14px;
      }

      h1 {
        margin: 8px 0 12px;
        font-size: 28px;
        letter-spacing: 0;
      }

      .eyebrow {
        color: #67e8f9;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="eyebrow">electric</div>
      <h1>오프라인 상태입니다</h1>
      <p>인터넷 연결을 확인한 뒤 다시 열어주세요. 연결이 복구되면 electric 학습 앱을 계속 사용할 수 있습니다.</p>
    </main>
  </body>
</html>
